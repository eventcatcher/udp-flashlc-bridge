name: Build

on:
  push:
    branches:
      - main
      - master

  pull_request:

permissions:
  contents: read

jobs:
  build:

    name: ${{ matrix.name }}

    strategy:
      fail-fast: false

      matrix:
        include:

          - name: macOS Intel
            os: macos-15-intel
            artifact: macos-x86_64

          - name: macOS Apple Silicon
            os: macos-14
            artifact: macos-arm64

          - name: Ubuntu x64
            os: ubuntu-latest
            artifact: linux-x86_64

          # Enable again once ARM runners are available
          # - name: Ubuntu ARM64
          #   os: ubuntu-24.04-arm
          #   artifact: linux-arm64

          - name: Windows x64
            os: windows-latest
            artifact: windows-x64

    runs-on: ${{ matrix.os }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: CMake version
        run: cmake --version

      - name: Configure
        run: >
          cmake
          -B build
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: >
          cmake
          --build build
          --config Release
          --verbose

      - name: Test
        run: ctest --test-dir build --output-on-failure
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: udp-flashlc-bridge-${{ matrix.artifact }}

          path: |
            build/udp-flashlc-bridge*
            build/Release/udp-flashlc-bridge.exe
